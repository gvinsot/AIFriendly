# Stack Docker Swarm pour IA Friendly
# Déploiement derrière Traefik v3 + Coraza WAF (réseau proxy)
# Build: depuis devops/ → docker compose -f docker-compose.swarm.yml build
# Déploiement: selon procédure homelab (stack deploy avec ce fichier)

version: "3.9"

services:
  ai-friendly:
    image: registry.methodinfo.fr/ai-friendly:latest
    build:
      context: ..
      dockerfile: webapp/Dockerfile
    environment:
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://${TRAEFIK_HOST}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - VLLM_API_URL=${VLLM_API_URL:-}
      - VLLM_API_KEY=${VLLM_API_KEY:-}
      - VLLM_MODEL=${VLLM_MODEL:-default}
    networks:
      - proxy
      - postgresqlcluster_internal
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.ai-friendly.loadbalancer.server.port=3000"
        # Router Auth (sans WAF) — priorité haute pour éviter blocage OAuth
        - "traefik.http.routers.ai-friendly-auth.rule=Host(`${TRAEFIK_HOST}`) && PathPrefix(`/api/auth`)"
        - "traefik.http.routers.ai-friendly-auth.entrypoints=websecure"
        - "traefik.http.routers.ai-friendly-auth.tls.certresolver=letsencrypt"
        - "traefik.http.routers.ai-friendly-auth.priority=100"
        - "traefik.http.routers.ai-friendly-auth.service=ai-friendly"
        # Router HTTPS (principal) — middleware global obligatoire (WAF, headers, rate limit)
        - "traefik.http.routers.ai-friendly.rule=Host(`${TRAEFIK_HOST}`)"
        - "traefik.http.routers.ai-friendly.entrypoints=websecure"
        - "traefik.http.routers.ai-friendly.tls.certresolver=letsencrypt"
        - "traefik.http.routers.ai-friendly.middlewares=global@file"
        - "traefik.http.routers.ai-friendly.service=ai-friendly"
        # Router HTTP (redirection vers HTTPS)
        - "traefik.http.routers.ai-friendly-http.rule=Host(`${TRAEFIK_HOST}`)"
        - "traefik.http.routers.ai-friendly-http.entrypoints=web"
        - "traefik.http.routers.ai-friendly-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.ai-friendly-http.service=noop@internal"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.gpu == none

  # MCP Server — Streamable HTTP MCP server protégé par clé API
  ai-friendly-mcp:
    image: registry.methodinfo.fr/ai-friendly-mcp:latest
    build:
      context: ..
      dockerfile: mcp-server/Dockerfile
    environment:
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - MCP_PORT=3001
    networks:
      - proxy
      - postgresqlcluster_internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.ai-friendly-mcp.loadbalancer.server.port=3001"
        # Router HTTPS pour le sous-domaine MCP
        - "traefik.http.routers.ai-friendly-mcp.rule=Host(`mcp.${TRAEFIK_HOST}`)"
        - "traefik.http.routers.ai-friendly-mcp.entrypoints=websecure"
        - "traefik.http.routers.ai-friendly-mcp.tls.certresolver=letsencrypt"
        - "traefik.http.routers.ai-friendly-mcp.service=ai-friendly-mcp"
        # Router HTTP (redirection vers HTTPS)
        - "traefik.http.routers.ai-friendly-mcp-http.rule=Host(`mcp.${TRAEFIK_HOST}`)"
        - "traefik.http.routers.ai-friendly-mcp-http.entrypoints=web"
        - "traefik.http.routers.ai-friendly-mcp-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.ai-friendly-mcp-http.service=noop@internal"
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.labels.gpu == none

  # Worker — analyses programmées et nettoyage automatique (60 jours)
  ai-friendly-worker:
    image: registry.methodinfo.fr/ai-friendly-worker:latest
    build:
      context: ..
      dockerfile: worker/Dockerfile
    environment:
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - VLLM_API_URL=${VLLM_API_URL:-}
      - VLLM_API_KEY=${VLLM_API_KEY:-}
      - VLLM_MODEL=${VLLM_MODEL:-default}
    networks:
      - proxy
      - postgresqlcluster_internal
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 30s
      placement:
        constraints:
          - node.labels.gpu == none

  # Migration — applique les migrations Prisma au déploiement (one-shot)
  ai-friendly-migrate:
    image: registry.methodinfo.fr/ai-friendly-migrate:latest
    build:
      context: ../prisma
      dockerfile: Dockerfile.migrate
    environment:
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
    networks:
      - postgresqlcluster_internal
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: none
      placement:
        constraints:
          - node.labels.gpu == none

networks:
  proxy:
    external: true
  postgresqlcluster_internal:
    external: true